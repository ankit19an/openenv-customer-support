name: customer-support-rl-env
version: "0.1.0"
description: >
  A policy-aware customer-support environment with escalating logistics,
  returns, and executive-escalation scenarios for RL and agent evaluation.
author: ankit19an
tags:
  - customer-support
  - reinforcement-learning
  - openenv
  - fastapi
tasks:
  - id: easy
    name: Delayed Anniversary Gift
    difficulty: easy
    domain: customer_support
  - id: medium
    name: Wrong Item And Delivery Delay
    difficulty: medium
    domain: customer_support
  - id: hard
    name: Refund, Compensation, And Executive Escalation
    difficulty: hard
    domain: customer_support
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
observation_schema: my_env.models.Observation
action_schema: my_env.models.Action
reward_schema: my_env.models.Reward
